<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Braille Remote Controller</title>
    
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --bg-main: #000000;
            --bg-panel: #0a0a0a;
            --bg-input: #111111;
            --bg-log: #050505;
            --accent-white: #ffffff;
            --border-color: #222222;
            --text-secondary: #666666;
            --text-log: #cccccc;
            --btn-gray: #111111;
            --btn-border: #333333;
        }

        /* FIX: Ensure the HTML and Body are strictly restricted to the visible window */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: var(--bg-main);
            overflow: hidden; /* Stops the whole page from bouncing/scrolling */
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .remote {
            background: var(--bg-panel);
            width: 100%;
            max-width: 400px;
            /* FIX: Use 100% height of parent (body) and 100dvh as a fallback */
            height: 100dvh;
            position: relative;
            border: 1px solid var(--border-color);
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden; /* Prevents internal elements from pushing the container larger */
        }

        /* --- Design remains exactly as you had it --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .header-title { font-size: 16px; font-weight: 600; letter-spacing: 0.5px; }
        .status-text { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; }
        .status-text.connected { color: var(--accent-white); }

        .log-area {
            position: absolute;
            top: 75px; left: 20px; right: 20px;
            height: 105px;
            background: var(--bg-log);
            border: 1px solid var(--btn-border);
            border-radius: 12px;
            padding: 12px;
            overflow-y: auto;
            font-size: 13px;
            color: var(--text-log);
            line-height: 1.4;
        }

        .btn-cluster {
            position: absolute;
            top: 255px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            width: 210px;
            z-index: 5;
        }

        @media (max-width: 380px) {
            .btn-cluster { width: 170px; }
            .action-btn { font-size: 12px; padding: 0 15px; }
            /* Adjust top position for very small screens to prevent collision with input */
            .btn-cluster { top: 220px; gap: 12px; }
            .arc-container { top: 200px; }
        }

        .action-btn {
            height: 70px;
            border-radius: 22px;
            background: var(--btn-gray);
            border: 1px solid var(--btn-border);
            color: #aaa;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            padding: 0 25px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .action-btn .icon {
            width: 22px; height: 22px; margin-right: 18px; fill: var(--accent-white);
            display: flex; align-items: center; justify-content: center;
        }

        .action-btn:active { background: var(--accent-white); color: var(--bg-main); }
        .action-btn:active .icon, .action-btn:active .icon svg { fill: var(--bg-main); color: var(--bg-main); }

        .arc-container {
            position: absolute;
            top: 240px; 
            right: 0px;
            width: 160px;
            height: 320px;
            cursor: ns-resize;
            touch-action: none;
        }

        .input-area {
            position: absolute;
            /* FIX: Increased bottom spacing + Safe Area for modern phones */
            bottom: calc(15px + env(safe-area-inset-bottom)); 
            left: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .text-input {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--btn-border);
            color: var(--accent-white);
            font-size: 16px;
            padding: 15px 20px;
            border-radius: 30px;
            outline: none;
            -webkit-user-select: text;
        }

        .send-btn {
            background: var(--accent-white);
            color: var(--bg-main);
            border: none;
            border-radius: 30px;
            padding: 0 25px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <main class="remote">
        <header class="header">
            <span class="header-title">BRAILLE CONTROLLER</span>
            <span id="status-text" class="status-text">Disconnected</span>
        </header>

        <section class="log-area" id="output-log">
            <div style="color: var(--accent-white);">Text Log</div>
        </section>

        <nav class="btn-cluster">
            <button class="action-btn" onclick="sendCommand('_seq_')">
                <span class="icon" style="font-size: 20px;">▶</span>Seq
            </button>
            <button class="action-btn" onclick="sendCommand('_clear_')">
                <span class="icon" style="font-size: 20px;">✕</span>Clear
            </button>
            <button class="action-btn" onclick="sendCommand('_reboot_')">
                <span class="icon">
                    <svg viewBox="0 0 24 24" width="22" height="22"><path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/></svg>
                </span>Reboot
            </button>
        </nav>

        <div class="arc-container" id="arcContainer">
            <svg viewBox="-30 0 170 300" style="pointer-events: none;">
                <g id="ticks"></g>
                <text x="40" y="140" font-size="9" fill="#777">BRAILLE</text>
                <text x="40" y="152" font-size="9" fill="#777">OUTPUT SPEED</text>
                <circle cx="10" cy="150" r="22" fill="#0a0a0a" stroke="#888" stroke-width="2"/>
                <text x="10" y="153" text-anchor="middle" font-size="13" fill="white" font-weight="600">
                    <tspan id="speedValue">2.0</tspan><tspan font-size="8" fill="#888">s</tspan>
                </text>
                <text x="105" y="25" font-size="10" fill="#777">MAX</text>
                <text x="105" y="285" font-size="10" fill="#777">MIN</text>
            </svg>
        </div>

        <section class="input-area">
            <input id="textInput" class="text-input" placeholder="Enter text..." autocomplete="off">
            <button class="send-btn" onclick="sendText()">Send</button>
        </section>
    </main>

    <script>
        const client = mqtt.connect('wss://test.mosquitto.org:8081/mqtt');
        const outputLog = document.getElementById('output-log');
        const statusText = document.getElementById('status-text');
        const speedDisplay = document.getElementById('speedValue');

        let currentSpeed = 2.0;

        client.on('connect', () => {
            statusText.innerText = "Connected";
            statusText.classList.add("connected");
            client.subscribe('tp/braille/output');
        });

        client.on('message', (topic, message) => {
            const cleanMsg = message.toString().replace(/^MESSAGE:\s*/i, '');
            outputLog.innerHTML += `<div>${cleanMsg}</div>`;
            outputLog.scrollTop = outputLog.scrollHeight;
        });

        function sendText() {
            const input = document.getElementById("textInput");
            if (input.value.trim()) {
                client.publish("tp/braille/input", input.value);
                input.value = "";
            }
        }

        function sendCommand(cmd) { client.publish("tp/braille/input", cmd); }

        const arcContainer = document.getElementById("arcContainer");
        const ticksGroup = document.getElementById("ticks");
        let isDragging = false, startY = 0, startSpeed = 0;

        function renderWheel() {
            ticksGroup.innerHTML = "";
            const cx = 130, cy = 150, rOuter = 120;
            for (let s = 0.2; s <= 10; s += 0.2) {
                const cleanS = Math.round(s * 10) / 10;
                const angle = Math.PI + (cleanS - currentSpeed) * -0.25;
                const dist = Math.abs(angle - Math.PI);
                if (dist < 1.2) {
                    const isMajor = cleanS % 1 === 0;
                    const rInner = isMajor ? 104 : 112;
                    ticksGroup.innerHTML += `<line x1="${cx + rOuter * Math.cos(angle)}" y1="${cy + rOuter * Math.sin(angle)}" x2="${cx + rInner * Math.cos(angle)}" y2="${cy + rInner * Math.sin(angle)}" stroke="rgba(255,255,255,${1 - dist/1.2})" stroke-width="${isMajor ? 3 : 2}" stroke-linecap="round" />`;
                }
            }
            speedDisplay.textContent = currentSpeed.toFixed(1);
        }

        arcContainer.addEventListener("pointerdown", e => {
            isDragging = true;
            startY = e.clientY;
            startSpeed = currentSpeed;
            arcContainer.setPointerCapture(e.pointerId);
        });

        window.addEventListener("pointermove", e => {
            if (!isDragging) return;
            let newSpeed = startSpeed + (e.clientY - startY) * 0.015;
            currentSpeed = Math.round(Math.max(0.1, Math.min(10, newSpeed)) * 10) / 10;
            renderWheel();
        });

        window.addEventListener("pointerup", () => {
            if (isDragging) {
                isDragging = false;
                client.publish("tp/braille/speed", currentSpeed.toFixed(1));
            }
        });

        renderWheel();
    </script>
</body>
</html>
