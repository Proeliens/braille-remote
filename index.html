<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Braille Remote Controller</title>
    
    <style>
        * { box-sizing: border-box; }

        :root {
            --bg-main: #000000;
            --bg-panel: #0a0a0a;
            --bg-input: #111111;
            --bg-log: #050505;
            --accent-white: #ffffff;
            --border-color: #222222;
            --text-secondary: #666666;
            --text-log: #cccccc;
            --btn-gray: #111111;
            --btn-border: #333333;
            --icon-dim: #999999;     
            --icon-bright: #ffffff;  
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: var(--bg-main);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        input, button, text, tspan {
            font-family: inherit;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .remote {
            background: var(--bg-panel);
            width: 100%;
            max-width: 400px;
            height: 100dvh; 
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- Header --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .header-title { 
            font-size: 16px; 
            font-weight: 600; 
            letter-spacing: 0.5px; 
            color: var(--accent-white);
            text-transform: uppercase;
        }
        
        .status-text { 
            font-size: 12px; 
            color: var(--text-secondary); 
            text-transform: uppercase; 
            font-weight: 700; 
        }
        .status-text.connected { color: #4ade80; } /* Made it green to clearly show WS connection */

        /* --- Middle Section --- */
        .middle-content {
            flex: 1; 
            display: flex;
            flex-direction: column;
            padding: 15px 20px;
            gap: 20px; 
            overflow: hidden; 
        }

        .log-area {
            flex-shrink: 0;
            height: 100px; 
            background: var(--bg-log);
            border: 1px solid var(--btn-border);
            border-radius: 12px;
            padding: 12px;
            overflow-y: auto;
            font-size: 13px;
            color: var(--text-log);
            line-height: 1.4;
        }

        .controls-row {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 0; 
            gap: 15px;
        }

        .btn-cluster {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 15px;
            flex: 1;
            max-width: 200px;
        }

        .action-btn {
            height: 70px;
            border-radius: 22px;
            background: var(--btn-gray);
            border: 1px solid var(--btn-border);
            color: var(--icon-dim);
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            padding: 0 25px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.1s ease;
        }

        .action-btn .icon {
            width: 22px; height: 22px; margin-right: 15px;
            display: flex; align-items: center; justify-content: center;
        }
        
        .action-btn .icon svg, 
        .action-btn .icon {
            fill: var(--icon-dim);
            color: var(--icon-dim);
            transition: all 0.2s ease;
        }

        .action-btn:active { 
            background: var(--accent-white); 
            color: var(--bg-main); 
        }
        
        .action-btn:active svg, 
        .action-btn:active .icon { 
            fill: var(--bg-main); 
            color: var(--bg-main); 
        }

        .arc-container {
            flex: 1;
            height: 100%;
            max-width: 160px;
            cursor: ns-resize;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }
        
        .arc-container svg {
            width: 100%;
            height: 100%;
            max-height: 320px;
        }

        /* --- Footer Input Area --- */
        .input-footer {
            flex-shrink: 0;
            padding: 20px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
            background: var(--bg-panel);
            border-top: 1px solid var(--border-color);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .text-input {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--btn-border);
            color: var(--accent-white);
            font-size: 16px;
            padding: 15px 60px 15px 20px;
            border-radius: 30px;
            outline: none;
            -webkit-user-select: text;
        }

        .inner-send-btn {
            position: absolute;
            right: 8px;
            height: 40px;
            width: 40px;
            background: var(--accent-white);
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s;
            padding-left: 4px; 
        }

        .inner-send-btn svg {
            width: 20px;
            height: 20px;
            fill: var(--bg-main); 
        }

        .inner-send-btn:active { 
            transform: scale(0.9); 
            opacity: 0.9; 
        }

        @media (max-width: 380px) {
            .middle-content { padding: 10px 15px; gap: 10px; }
            .action-btn { height: 60px; font-size: 12px; padding: 0 15px; }
            .btn-cluster { gap: 10px; }
        }
        @media (max-height: 600px) {
            .log-area { height: 70px; } 
            .action-btn { height: 50px; }
        }
    </style>
</head>

<body>
    <main class="remote">
        <header class="header">
            <span class="header-title">Braille Remote</span>
            <span id="status-text" class="status-text">Disconnected</span>
        </header>

        <div class="middle-content">
            <section class="log-area" id="output-log">
                <div style="color: var(--accent-white);">Text Log</div>
            </section>

            <div class="controls-row">
                <nav class="btn-cluster">
                    <button class="action-btn" onclick="sendCommand('_seq_')">
                        <span class="icon">
                            <svg viewBox="0 0 24 24" width="22" height="22"><path d="M8 5v14l11-7z"/></svg>
                        </span>
                        Sequence
                    </button>
                    <button class="action-btn" onclick="sendCommand('_clear_')">
                        <span class="icon">
                            <svg viewBox="0 0 24 24" width="22" height="22"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                        </span>
                        Clear
                    </button>
                    <button class="action-btn" onclick="sendCommand('_reboot_')">
                        <span class="icon">
                            <svg viewBox="0 0 24 24" width="22" height="22"><path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/></svg>
                        </span>
                        Reboot
                    </button>
                </nav>

                <div class="arc-container" id="arcContainer">
                    <svg viewBox="-30 0 170 300" preserveAspectRatio="xMidYMid meet" style="pointer-events: none;">
                        <g id="ticks"></g>
                        <text x="40" y="140" font-size="9" fill="#777">BRAILLE</text>
                        <text x="40" y="152" font-size="9" fill="#777">OUTPUT SPEED</text>
                        <circle cx="10" cy="150" r="22" fill="#0a0a0a" stroke="#888" stroke-width="2"/>
                        <text x="10" y="153" text-anchor="middle" font-size="13" fill="white" font-weight="600">
                            <tspan id="speedValue">2.0</tspan><tspan font-size="8" fill="#888">s</tspan>
                        </text>
                        <text x="105" y="25" font-size="10" fill="#777">MAX</text>
                        <text x="105" y="285" font-size="10" fill="#777">MIN</text>
                    </svg>
                </div>
            </div>
        </div>

        <footer class="input-footer">
            <div class="input-wrapper">
                <input id="textInput" class="text-input" placeholder="Write a Message..." autocomplete="off">
                <button class="inner-send-btn" onclick="sendText()">
                    <svg viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                    </svg>
                </button>
            </div>
        </footer>
    </main>

    <script>
        // --- WEBSOCKET CONFIGURATION ---
        // Change this to your actual WebSocket server URL
const wsUrl = 'wss://your-secure-server.com/ws';
        
        let ws;
        const outputLog = document.getElementById('output-log');
        const statusText = document.getElementById('status-text');
        const speedDisplay = document.getElementById('speedValue');
        let currentSpeed = 2.0;

        function connectWebSocket() {
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                statusText.innerText = "Connected";
                statusText.classList.add("connected");
            };

            ws.onmessage = (event) => {
                // If your server sends JSON, you might need to parse it first:
                // const data = JSON.parse(event.data);
                
                // Assuming server sends simple text for the log:
                const cleanMsg = event.data.toString().replace(/^MESSAGE:\s*/i, '');
                outputLog.innerHTML += `<div>${cleanMsg}</div>`;
                outputLog.scrollTop = outputLog.scrollHeight;
            };

            ws.onclose = () => {
                statusText.innerText = "Disconnected";
                statusText.classList.remove("connected");
                // Optional: Auto-reconnect after 3 seconds
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = (error) => {
                console.error("WebSocket Error:", error);
            };
        }

        // Initialize connection
        connectWebSocket();

        // --- HELPER TO SEND DATA ---
        function sendWebSocketMessage(topic, data) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                // Mimicking MQTT topics using a JSON payload
                const payload = JSON.stringify({ topic: topic, data: data });
                ws.send(payload);
                
                // If your backend ONLY wants raw strings instead of JSON, use this instead:
                // ws.send(data);
            } else {
                console.warn("WebSocket is not connected. Cannot send message.");
            }
        }

        // --- UI ACTIONS ---
        function sendText() {
            const input = document.getElementById("textInput");
            if (input.value.trim()) {
                sendWebSocketMessage("tp/braille/input", input.value);
                input.value = "";
            }
        }

        function sendCommand(cmd) { 
            sendWebSocketMessage("tp/braille/input", cmd); 
        }

        document.getElementById("textInput").addEventListener("keydown", (e) => {
            if (e.key === "Enter") sendText();
        });

        // --- ARC SLIDER LOGIC ---
        const arcContainer = document.getElementById("arcContainer");
        const ticksGroup = document.getElementById("ticks");
        let isDragging = false, startY = 0, startSpeed = 0;

        function renderWheel() {
            ticksGroup.innerHTML = "";
            const cx = 130, cy = 150, rOuter = 120;
            for (let s = 0.2; s <= 10; s += 0.2) {
                const cleanS = Math.round(s * 10) / 10;
                const angle = Math.PI + (cleanS - currentSpeed) * -0.25;
                const dist = Math.abs(angle - Math.PI);
                if (dist < 1.2) {
                    const isMajor = cleanS % 1 === 0;
                    const rInner = isMajor ? 104 : 112;
                    ticksGroup.innerHTML += `<line x1="${cx + rOuter * Math.cos(angle)}" y1="${cy + rOuter * Math.sin(angle)}" x2="${cx + rInner * Math.cos(angle)}" y2="${cy + rInner * Math.sin(angle)}" stroke="rgba(255,255,255,${1 - dist/1.2})" stroke-width="${isMajor ? 3 : 2}" stroke-linecap="round" />`;
                }
            }
            speedDisplay.textContent = currentSpeed.toFixed(1);
        }

        arcContainer.addEventListener("pointerdown", e => {
            isDragging = true;
            startY = e.clientY;
            startSpeed = currentSpeed;
            arcContainer.setPointerCapture(e.pointerId);
        });

        window.addEventListener("pointermove", e => {
            if (!isDragging) return;
            let newSpeed = startSpeed + (e.clientY - startY) * 0.015;
            currentSpeed = Math.round(Math.max(0.1, Math.min(10, newSpeed)) * 10) / 10;
            renderWheel();
        });

        window.addEventListener("pointerup", () => {
            if (isDragging) {
                isDragging = false;
                sendWebSocketMessage("tp/braille/speed", currentSpeed.toFixed(1));
            }
        });

        renderWheel();
    </script>
</body>
</html>
